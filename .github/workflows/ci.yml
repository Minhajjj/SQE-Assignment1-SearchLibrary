# ============================================================
# GitHub Actions CI/CD – Search Algorithm Library
# SQE Assignment 1 | MC/DC Test Suite
#
# Triggers:
#   • Every push to any branch
#   • Every pull request targeting main
#
# What it does:
#   1. Checkout code
#   2. Set up Node.js (LTS)
#   3. Install dependencies (npm ci)
#   4. Run full Jest MC/DC test suite with coverage
#   5. Upload coverage report as an artifact
#   6. Fail the build if coverage thresholds are not met
# ============================================================

name: MC/DC Test Suite & Coverage

on:
  push:
    branches:
      - "**" # Run on every branch push
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Run MC/DC Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Don't cancel other matrix jobs on failure
      matrix:
        node-version: [18.x, 20.x] # Test on two LTS versions

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Node.js ────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Note: cache: 'npm' requires package-lock.json — omitted intentionally

      # ── Step 3: Install dependencies ─────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── Step 4: Run MC/DC test suite ─────────────────────────────
      - name: Run Jest MC/DC tests with coverage
        run: npm run test:ci

      # ── Step 5: Upload coverage report ───────────────────────────
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # Upload even on test failure
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

      # ── Step 6: Summary comment ───────────────────────────────────
      - name: Print coverage summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Node version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage summary available in uploaded artifact." >> $GITHUB_STEP_SUMMARY
          fi
